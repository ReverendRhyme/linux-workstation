repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  - repo: local
    hooks:
      - id: migration-allowlist
        name: migration allowlist
        entry: ./scripts/linux/check-migration-allowlist.sh --staged
        language: system
        pass_filenames: false
