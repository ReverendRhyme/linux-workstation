name: Ansible Lint + YAML Validate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install tooling
        run: pip install ansible ansible-lint yamllint

      - name: Run ansible-lint
        run: ansible-lint ansible/

      - name: Run yamllint
        run: yamllint .

      - name: Enforce migration context allowlist
        run: ./scripts/linux/check-migration-allowlist.sh --all

      - name: Validate sample migration context
        run: python3 scripts/linux/validate-migration-context.py --all-contexts --context-root migration/context
