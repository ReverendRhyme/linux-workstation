name: Bug report
description: Report a reproducible bug in setup, migration, or verification flows.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact commands and order.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
      description: Paste relevant output or attach logs.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - migration-context
        - fusion360
        - ansible-roles
        - scripts/wrappers
        - docs
    validations:
      required: true
