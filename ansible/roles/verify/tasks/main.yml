---
- name: Collect installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Verify required binaries
  ansible.builtin.command: "bash -lc 'command -v {{ item }}'"
  loop:
    - apt
    - git
    - curl
  register: verify_required_bins
  changed_when: false
  failed_when: false

- name: Verify optional binaries
  ansible.builtin.command: "bash -lc 'command -v {{ item }}'"
  loop:
    - steam
    - docker
    - zsh
    - rclone
  register: verify_optional_bins
  changed_when: false
  failed_when: false

- name: Summarize required binary checks
  ansible.builtin.debug:
    msg: >-
      Required commands present: {{ verify_required_bins.results
      | selectattr('rc', 'equalto', 0)
      | map(attribute='item')
      | list
      }}

- name: Summarize optional binary checks
  ansible.builtin.debug:
    msg: >-
      Optional commands present: {{ verify_optional_bins.results
      | selectattr('rc', 'equalto', 0)
      | map(attribute='item')
      | list
      }}

- name: Verify game mount directory exists
  ansible.builtin.stat:
    path: "{{ mount_games | default('/mnt/games') }}"
  register: verify_mount_games

- name: Report mount directory state
  ansible.builtin.debug:
    msg: >-
      Mount path {{ mount_games | default('/mnt/games') }} exists={{ verify_mount_games.stat.exists }}
