---
- name: Collect installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Resolve verification profile flags
  ansible.builtin.set_fact:
    verify_deploy_profile: "{{ deploy_profile | default('full') }}"
    verify_gaming_profile: "{{ (deploy_profile | default('full')) in ['full', 'gaming'] }}"
    verify_gaming_extended: "{{ gaming_extended_tools | default(false) | bool }}"

- name: Assert required apt packages are installed
  ansible.builtin.assert:
    that:
      - "'curl' in ansible_facts.packages"
      - "'git' in ansible_facts.packages"
      - "'flatpak' in ansible_facts.packages"
    fail_msg: "Required base packages missing: check curl, git, flatpak"
    success_msg: "All required base packages are installed"

- name: Assert core binaries are available
  ansible.builtin.command: "bash -lc 'command -v {{ item }}'"
  loop:
    - apt
    - git
    - curl
  changed_when: false

- name: Verify optional binaries (non-failing)
  ansible.builtin.command: "bash -lc 'command -v {{ item }}'"
  loop:
    - steam
    - lutris
    - docker
    - zsh
    - rclone
    - blender
  register: verify_optional_bins
  changed_when: false
  failed_when: false

- name: Report optional binary availability
  ansible.builtin.debug:
    msg: >-
      Optional commands present: {{ verify_optional_bins.results
      | selectattr('rc', 'equalto', 0)
      | map(attribute='item')
      | list
      }}

- name: Report optional commands missing
  ansible.builtin.debug:
    msg: >-
      Optional commands missing: {{ verify_optional_bins.results
      | rejectattr('rc', 'equalto', 0)
      | map(attribute='item')
      | list }}

- name: Assert game mount directory exists
  ansible.builtin.stat:
    path: "{{ mount_games }}"
  register: verify_mount_games

- name: Fail if game mount directory is missing
  ansible.builtin.assert:
    that: verify_mount_games.stat.exists
    fail_msg: "Game mount directory {{ mount_games }} does not exist"
    success_msg: "Game mount directory {{ mount_games }} exists"

- name: Assert UFW is enabled
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false

- name: Report firewall status
  ansible.builtin.debug:
    msg: "UFW status: {{ ufw_status.stdout_lines | default(['unknown']) }}"

- name: Assert Docker service is running
  ansible.builtin.assert:
    that: "'docker.service' in ansible_facts.services and ansible_facts.services['docker.service'].state == 'running'"
    fail_msg: "Docker service is not running"
    success_msg: "Docker service is running"
  failed_when: false

- name: Check required gaming flatpaks for gaming profiles
  ansible.builtin.command:
    cmd: "flatpak info {{ item }}"
  loop:
    - net.lutris.Lutris
    - com.heroicgameslauncher.hgl
    - net.davidotek.pupgui2
  register: verify_gaming_flatpaks
  changed_when: false
  failed_when: false
  when: verify_gaming_profile

- name: Assert required gaming flatpaks are present
  ansible.builtin.assert:
    that: verify_gaming_flatpaks.results | map(attribute='rc') | max == 0
    fail_msg: >-
      One or more required gaming flatpaks are missing for profile {{ verify_deploy_profile }}.
      Expected: Lutris, Heroic, ProtonUp-Qt.
    success_msg: "Required gaming flatpaks are present"
  when: verify_gaming_profile

- name: Check extended gaming tools flatpaks
  ansible.builtin.command:
    cmd: "flatpak info {{ item }}"
  loop:
    - com.github.tchx84.Flatseal
    - io.github.flattool.Warehouse
    - it.mijorus.gearlever
  register: verify_extended_gaming_flatpaks
  changed_when: false
  failed_when: false
  when:
    - verify_gaming_profile
    - verify_gaming_extended

- name: Assert extended gaming tools are present
  ansible.builtin.assert:
    that: verify_extended_gaming_flatpaks.results | map(attribute='rc') | max == 0
    fail_msg: >-
      Extended gaming tools requested but one or more flatpaks are missing.
      Expected: Flatseal, Warehouse, Gear Lever.
    success_msg: "Extended gaming tools are present"
  when:
    - verify_gaming_profile
    - verify_gaming_extended

- name: Resolve Fusion 360 verify provider
  ansible.builtin.set_fact:
    verify_fusion_provider: "{{ fusion360_provider | default('codeberg-script') }}"
    verify_fusion_user_home: "{{ lookup('env', 'HOME') }}"
    verify_fusion_binary_path: "{{ fusion360_binary_path | default((lookup('env', 'HOME') ~ '/.autodesk_fusion/bin/fusion360')) }}"
  when: use_fusion360 | default(false) | bool

- name: Check Fusion 360 native binary for codeberg-script provider
  ansible.builtin.stat:
    path: "{{ verify_fusion_binary_path }}"
  register: verify_fusion_binary
  when:
    - use_fusion360 | default(false) | bool
    - verify_fusion_provider == 'codeberg-script'

- name: Assert Fusion 360 native binary exists
  ansible.builtin.assert:
    that: verify_fusion_binary.stat.exists
    fail_msg: >-
      Fusion 360 required but native binary missing at {{ verify_fusion_binary_path }}.
      Try setting fusion360_fallback_provider=bottles or rerun with fusion360_enable_proton=true.
    success_msg: "Fusion 360 native binary detected"
  when:
    - use_fusion360 | default(false) | bool
    - verify_fusion_provider == 'codeberg-script'

- name: Verify Bottles is installed for Fusion 360 bottles provider
  ansible.builtin.command:
    cmd: flatpak info com.usebottles.bottles
  register: verify_bottles
  changed_when: false
  failed_when: false
  when:
    - use_fusion360 | default(false) | bool
    - verify_fusion_provider == 'bottles'

- name: Assert Bottles is available for Fusion 360 fallback
  ansible.builtin.assert:
    that: verify_bottles.rc == 0
    fail_msg: "Fusion 360 bottles provider selected, but Bottles is not installed"
    success_msg: "Bottles provider is installed for Fusion 360"
  when:
    - use_fusion360 | default(false) | bool
    - verify_fusion_provider == 'bottles'
