- name: Check if OrcaSlicer is installed
  ansible.builtin.stat:
    path: /opt/OrcaSlicer.AppImage
  register: orcaslicer_installed
  when: install_orcaslicer | bool

- name: Ensure local applications directory exists
  ansible.builtin.file:
    path: /usr/local/share/applications
    state: directory
    mode: '0755'

- name: Install OrcaSlicer (3D printing slicer)
  when:
    - install_orcaslicer | bool
    - not orcaslicer_installed.stat.exists
  block:
    - name: Query OrcaSlicer latest release metadata
      ansible.builtin.uri:
        url: https://api.github.com/repos/SoftFever/OrcaSlicer/releases/latest
        return_content: true
      register: orcaslicer_release

    - name: Resolve OrcaSlicer latest AppImage URL
      ansible.builtin.set_fact:
        orcaslicer_download_url: >-
          {{
            (orcaslicer_release.json.assets
            | json_query("[?contains(name, 'Linux') && contains(name, 'AppImage')].browser_download_url | [0]"))
            | default('')
          }}

    - name: Assert OrcaSlicer latest asset URL was found
      ansible.builtin.assert:
        that:
          - orcaslicer_download_url | length > 0
        fail_msg: "Could not locate latest OrcaSlicer AppImage asset URL"

    - name: Download OrcaSlicer AppImage
      get_url:
        url: "{{ orcaslicer_download_url }}"
        dest: "/tmp/OrcaSlicer.AppImage"
        mode: '0755'
      failed_when: false

    - name: Check OrcaSlicer download
      ansible.builtin.stat:
        path: /tmp/OrcaSlicer.AppImage
      register: orcaslicer_download

    - name: Install OrcaSlicer to /opt
      copy:
        src: "/tmp/OrcaSlicer.AppImage"
        dest: "/opt/OrcaSlicer.AppImage"
        remote_src: yes
        mode: '0755'
      when: orcaslicer_download.stat.exists

    - name: Create OrcaSlicer desktop entry
      copy:
        dest: "/usr/local/share/applications/OrcaSlicer.desktop"
        content: |
          [Desktop Entry]
          Name=OrcaSlicer
          Comment=3D Printer Slicer
          Exec=/opt/OrcaSlicer.AppImage
          Icon=org.softfever.orcaslicer
          Terminal=false
          Type=Application
          Categories=Graphics;3DGraphics;
        mode: '0644'
      when: orcaslicer_download.stat.exists

- name: Check OrcaSlicer install artifact after role execution
  ansible.builtin.stat:
    path: /opt/OrcaSlicer.AppImage
  register: orcaslicer_binary_exists
  when: install_orcaslicer | bool

- name: Ensure OrcaSlicer desktop entry exists
  ansible.builtin.copy:
    dest: "/usr/local/share/applications/OrcaSlicer.desktop"
    content: |
      [Desktop Entry]
      Name=OrcaSlicer
      Comment=3D Printer Slicer
      Exec=/opt/OrcaSlicer.AppImage
      Icon=org.softfever.orcaslicer
      Terminal=false
      Type=Application
      Categories=Graphics;3DGraphics;
    mode: '0644'
  when:
    - install_orcaslicer | bool
    - orcaslicer_binary_exists.stat.exists

- name: Check if Bambu Studio is installed
  ansible.builtin.stat:
    path: /opt/BambuStudio
  register: bambustudio_installed
  when: install_bambustudio | bool

- name: Install Bambu Studio (Bambu Lab slicer)
  when:
    - install_bambustudio | bool
    - not bambustudio_installed.stat.exists
  block:
    - name: Query Bambu Studio latest release metadata
      ansible.builtin.uri:
        url: https://api.github.com/repos/bambulab/BambuStudio/releases/latest
        return_content: true
      register: bambustudio_release

    - name: Resolve Bambu Studio latest Linux zip URL
      ansible.builtin.set_fact:
        bambustudio_download_url: >-
          {{
            (bambustudio_release.json.assets
            | json_query("[?contains(name, 'BambuStudio') && contains(name, 'linux')].browser_download_url | [0]"))
            | default('')
          }}

    - name: Assert Bambu Studio latest asset URL was found
      ansible.builtin.assert:
        that:
          - bambustudio_download_url | length > 0
        fail_msg: "Could not locate latest Bambu Studio Linux zip asset URL"

    - name: Download Bambu Studio AppImage
      get_url:
        url: "{{ bambustudio_download_url }}"
        dest: "/tmp/BambuStudio.zip"
        mode: '0755'
      failed_when: false

    - name: Check Bambu Studio download
      ansible.builtin.stat:
        path: /tmp/BambuStudio.zip
      register: bambustudio_download

    - name: Extract Bambu Studio
      unarchive:
        src: "/tmp/BambuStudio.zip"
        dest: "/opt/"
        remote_src: yes
        creates: "/opt/BambuStudio"
      when: bambustudio_download.stat.exists

    - name: Create Bambu Studio desktop entry
      copy:
        dest: "/usr/local/share/applications/BambuStudio.desktop"
        content: |
          [Desktop Entry]
          Name=Bambu Studio
          Comment=Bambu Lab 3D Printer Slicer
          Exec=/opt/BambuStudio/bambu-studio
          Icon=/opt/BambuStudio/resources/icons/AppIcon.ico
          Terminal=false
          Type=Application
          Categories=Graphics;3DGraphics;
        mode: '0644'
      when: bambustudio_download.stat.exists

