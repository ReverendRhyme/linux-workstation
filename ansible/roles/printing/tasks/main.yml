    - name: Resolve CHITUBOX latest Linux AppImage URL
      ansible.builtin.set_fact:
        chitubox_download_url: >-
          {{
            (chitubox_release.json.assets
            | json_query("[?contains(name, 'CHITUBOX') && contains(name, 'linux') && contains(name, 'AppImage')].browser_download_url | [0]"))
            | default('')
          }}

    - name: Assert CHITUBOX latest asset URL was found
      ansible.builtin.assert:
        that:
          - chitubox_download_url | length > 0
        fail_msg: "Could not locate latest CHITUBOX Linux AppImage asset URL"

    - name: Download CHITUBOX AppImage
      get_url:
        url: "{{ chitubox_download_url }}"
        dest: "/tmp/CHITUBOX.AppImage"
        mode: '0755'
      failed_when: false

    - name: Check CHITUBOX download
      ansible.builtin.stat:
        path: /tmp/CHITUBOX.AppImage
      register: chitubox_download

    - name: Install CHITUBOX to /opt
      copy:
        src: "/tmp/CHITUBOX.AppImage"
        dest: "/opt/CHITUBOX.AppImage"
        remote_src: yes
        mode: '0755'
      when: chitubox_download.stat.exists

    - name: Create CHITUBOX desktop entry
      copy:
        dest: "/usr/local/share/applications/CHITUBOX.desktop"
        content: |
          [Desktop Entry]
          Name=CHITUBOX
          Comment=Resin 3D Printer Slicer
          Exec=/opt/CHITUBOX.AppImage
          Icon=chitubox
          Terminal=false
          Type=Application
          Categories=Graphics;3DGraphics;
        mode: '0644'
      when: chitubox_download.stat.exists

- name: Install PrusaSlicer (alternative slicer)
  apt:
    name: prusaslicer
    state: present
  failed_when: false
  when: install_prusaslicer | bool

- name: Install Cura (Ultimaker slicer)
  apt:
    name: cura
    state: present
  failed_when: false
  when: install_cura | bool

- name: Create 3D printing data directory
  file:
    path: "{{ printing_data_dir }}"
    state: directory
    mode: '0755'
