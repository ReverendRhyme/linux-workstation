- name: Install development toolchains
  apt:
    name:
      - zsh
      - python3-pip
      - docker.io
    state: present

- name: Install Docker Compose plugin
  apt:
    name: docker-compose-plugin
    state: present
  register: docker_compose_plugin_install
  failed_when: false

- name: Install Docker Compose v2 fallback
  apt:
    name: docker-compose-v2
    state: present
  when: "'No package matching' in (docker_compose_plugin_install.msg | default(''))"
  failed_when: false

- name: Add user to docker group
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes

- name: Set CPU governor to performance
  apt:
    name: cpufrequtils
    state: present

- name: Configure cpufrequtils
  lineinfile:
    path: /etc/default/cpufrequtils
    create: yes
    line: GOVERNOR="performance"
    mode: '0644'

- name: Disable ondemand service
  systemd:
    name: ondemand
    enabled: no
    state: stopped
  failed_when: false

- name: Enable cpufrequtils service
  systemd:
    name: cpufrequtils
    enabled: yes
    state: started
  failed_when: false

- name: Install Oh My Zsh
  shell: |
    RUNZSH=no sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: /home/{{ lookup('env', 'SUDO_USER') | default(ansible_user_id, true) }}/.oh-my-zsh
  become: yes
  become_user: "{{ lookup('env', 'SUDO_USER') | default(ansible_user_id, true) }}"
