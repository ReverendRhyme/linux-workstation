- name: Update apt cache
  apt:
    update_cache: yes

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install core utilities
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - gnupg
      - build-essential
    state: present

- name: Install system monitoring tools
  apt:
    name:
      - htop
      - btop
      - neofetch
      - ncdu
    state: present

- name: Install CLI tools
  apt:
    name:
      - ripgrep
      - fd-find
      - bat
      - fzf
      - tree
      - jq
    state: present

- name: Install Flatpak
  apt:
    name: flatpak
    state: present

- name: Add Flathub repository
  command: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  changed_when: false

- name: Install LibreOffice (Office suite)
  apt:
    name:
      - libreoffice
      - libreoffice-gnome
    state: present

- name: Install FileZilla (FTP client)
  apt:
    name: filezilla
    state: present

- name: Install Notepadqq (Notepad++ alternative)
  apt:
    name: notepadqq
    state: present
  failed_when: false

- name: Resolve 1Password apt architecture
  set_fact:
    onepassword_apt_arch: >-
      {{ 'amd64' if ansible_architecture in ['x86_64', 'amd64']
      else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
      else ansible_architecture }}

- name: Check legacy 1Password flatpak install
  command: flatpak info com.1password.1Password
  register: flatpak_1password_legacy
  changed_when: false
  failed_when: false

- name: Remove legacy 1Password flatpak install
  command: flatpak uninstall -y --system com.1password.1Password
  when: flatpak_1password_legacy.rc == 0
  failed_when: false

- name: Add 1Password apt signing key
  apt_key:
    url: https://downloads.1password.com/linux/keys/1password.asc
    keyring: /usr/share/keyrings/1password-archive-keyring.gpg
    state: present
  failed_when: false

- name: Add 1Password apt repository
  apt_repository:
    repo: "deb [arch={{ onepassword_apt_arch }} signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/{{ onepassword_apt_arch }} stable main"
    filename: 1password
    state: present
    update_cache: yes
  failed_when: false

- name: Install 1Password (password manager)
  apt:
    name: 1password
    state: present
  failed_when: false

- name: Check Slack flatpak
  command: flatpak info com.slack.Slack
  register: flatpak_slack
  changed_when: false
  failed_when: false

- name: Install Slack
  command: flatpak install -y flathub com.slack.Slack
  when: flatpak_slack.rc != 0
  failed_when: false

- name: Check Zoom flatpak
  command: flatpak info us.zoom.Zoom
  register: flatpak_zoom
  changed_when: false
  failed_when: false

- name: Install Zoom
  command: flatpak install -y flathub us.zoom.Zoom
  when: flatpak_zoom.rc != 0
  failed_when: false

- name: Check Obsidian flatpak
  command: flatpak info md.obsidian.Obsidian
  register: flatpak_obsidian
  changed_when: false
  failed_when: false

- name: Install Obsidian (note-taking)
  command: flatpak install -y flathub md.obsidian.Obsidian
  when: flatpak_obsidian.rc != 0
  failed_when: false

- name: Check Spotify flatpak
  command: flatpak info com.spotify.Client
  register: flatpak_spotify
  changed_when: false
  failed_when: false

- name: Install Spotify
  command: flatpak install -y flathub com.spotify.Client
  when: flatpak_spotify.rc != 0
  failed_when: false
