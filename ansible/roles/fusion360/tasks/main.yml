- name: Resolve Fusion 360 provider
  ansible.builtin.set_fact:
    fusion360_effective_provider: "{{ fusion360_provider | default('codeberg-script') }}"
    fusion360_effective_fallback_provider: "{{ fusion360_fallback_provider | default('bottles') }}"

- name: Validate Fusion 360 provider choices
  ansible.builtin.assert:
    that:
      - fusion360_effective_provider in ['codeberg-script', 'bottles', 'web', 'vm']
      - fusion360_effective_fallback_provider in ['none', 'codeberg-script', 'bottles', 'web', 'vm']
    fail_msg: >-
      Invalid Fusion 360 provider value(s). provider={{ fusion360_effective_provider }},
      fallback={{ fusion360_effective_fallback_provider }}

- name: Ensure Fusion 360 user application directory exists
  ansible.builtin.file:
    path: "{{ fusion360_user_home }}/.local/share/applications"
    state: directory
    mode: '0755'
  become: yes
  become_user: "{{ fusion360_user }}"
  environment:
    HOME: "{{ fusion360_user_home }}"

- name: Install Fusion 360 using selected provider
  block:
    - name: Run primary Fusion 360 provider tasks
      ansible.builtin.include_tasks: "providers/{{ fusion360_effective_provider }}.yml"
  rescue:
    - name: Report primary Fusion 360 provider failure
      ansible.builtin.debug:
        msg: >-
          Primary Fusion 360 provider '{{ fusion360_effective_provider }}' failed.
          Trying fallback '{{ fusion360_effective_fallback_provider }}'.

    - name: Fail when Fusion 360 fallback is disabled
      ansible.builtin.fail:
        msg: >-
          Fusion 360 installation failed and no fallback provider is enabled.
          Set fusion360_fallback_provider to one of: bottles, web, vm.
      when:
        - fusion360_effective_fallback_provider == 'none'

    - name: Skip invalid or duplicate Fusion 360 fallback provider
      ansible.builtin.fail:
        msg: >-
          Fusion 360 fallback provider '{{ fusion360_effective_fallback_provider }}' is invalid
          or matches the primary provider '{{ fusion360_effective_provider }}'.
      when:
        - fusion360_effective_fallback_provider not in ['codeberg-script', 'bottles', 'web', 'vm']
          or fusion360_effective_fallback_provider == fusion360_effective_provider

    - name: Run fallback Fusion 360 provider tasks
      ansible.builtin.include_tasks: "providers/{{ fusion360_effective_fallback_provider }}.yml"
