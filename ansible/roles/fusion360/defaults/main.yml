---
use_fusion360: false
fusion360_provider: codeberg-script
fusion360_fallback_provider: bottles
fusion360_channel: stable
fusion360_codeberg_installer_url: "https://codeberg.org/cryinkfly/Autodesk-Fusion-360-on-Linux/raw/branch/main/files/setup/autodesk_fusion_installer_x86-64.sh"
fusion360_codeberg_installer_url_dev: "https://codeberg.org/cryinkfly/Autodesk-Fusion-360-on-Linux/raw/branch/dev/files/setup/autodesk_fusion_installer_x86-64.sh"
fusion360_pinned_url: ""
fusion360_installer_sha256: ""
fusion360_enable_proton: false
fusion360_proton_version: "GE-Proton10-32"
fusion360_user: "{{ lookup('env', 'SUDO_USER') | default(ansible_user_id, true) }}"
fusion360_user_home: "{{ lookup('env', 'HOME') }}"
fusion360_install_root: "{{ fusion360_user_home }}/.autodesk_fusion"
fusion360_binary_path: "{{ fusion360_install_root }}/bin/fusion360"
fusion360_installer_tmp_path: "/tmp/fusion360_installer.sh"
