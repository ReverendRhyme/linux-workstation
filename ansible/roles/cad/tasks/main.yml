- name: Install Blender (native Linux)
  apt:
    name: blender
    state: present

- name: Check FreeCAD apt availability
  command: apt-cache policy freecad
  register: freecad_policy
  changed_when: false

- name: Install FreeCAD (open source CAD alternative)
  apt:
    name: freecad
    state: present
  when: "'Candidate: (none)' not in freecad_policy.stdout"

- name: Check Flatpak FreeCAD
  command: flatpak info org.freecad.FreeCAD
  register: flatpak_freecad
  changed_when: false
  failed_when: false
  when: "'Candidate: (none)' in freecad_policy.stdout"

- name: Install FreeCAD Flatpak fallback
  command: flatpak install -y flathub org.freecad.FreeCAD
  when:
    - "'Candidate: (none)' in freecad_policy.stdout"
    - flatpak_freecad.rc != 0
  failed_when: false

- name: Install OpenSCAD (parametric CAD)
  apt:
    name: openscad
    state: present

- name: Install MeshLab (mesh processing)
  apt:
    name: meshlab
    state: present

- name: Install GIMP for texture editing
  apt:
    name: gimp
    state: present

- name: Install Inkscape (vector graphics)
  apt:
    name: inkscape
    state: present

- name: Check Flatpak Blender
  command: flatpak info org.blender.Blender
  register: flatpak_blender
  changed_when: false
  failed_when: false

- name: Install Flatpak version of Blender (latest)
  command: flatpak install -y flathub org.blender.Blender
  when: flatpak_blender.rc != 0
  failed_when: false

- name: Install Fusion 360 web app (PWA)
  debug:
    msg: "Fusion 360 web version available at https://fusion.cloud.autodesk.com"

- name: Resolve CAD launcher user
  set_fact:
    cad_user: "{{ lookup('env', 'SUDO_USER') | default(ansible_user_id, true) }}"
    cad_user_home: "{{ ('/home/' ~ lookup('env', 'SUDO_USER')) if (lookup('env', 'SUDO_USER') | length > 0) else lookup('env', 'HOME') }}"

- name: Ensure CAD desktop entry directory exists
  file:
    path: "{{ cad_user_home }}/.local/share/applications"
    state: directory
    mode: '0755'
  become: true
  become_user: "{{ cad_user }}"
  environment:
    HOME: "{{ cad_user_home }}"

- name: Create Onshape web desktop entry
  copy:
    dest: "{{ cad_user_home }}/.local/share/applications/onshape.desktop"
    mode: '0644'
    content: |
      [Desktop Entry]
      Name=Onshape
      Comment=Cloud-native CAD in your browser
      Exec=xdg-open https://cad.onshape.com
      Icon=applications-engineering
      Terminal=false
      Type=Application
      Categories=Graphics;3DGraphics;CAD;
  become: true
  become_user: "{{ cad_user }}"
  environment:
    HOME: "{{ cad_user_home }}"
